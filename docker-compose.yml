
name: ttv-dev
services:
  mysql:
    image: mysql:8.4
    container_name: ttv-dev-mysql
    environment:
      MYSQL_DATABASE: ttv_torneios
      MYSQL_USER: ttv
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ttv_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    volumes:
      - ttv_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - mysql

  backend:
    container_name: ttv-dev-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: mysql+pymysql://ttv:${MYSQL_PASSWORD:-ttv_secret}@mysql:3306/ttv_torneios
      SECRET_KEY: ${SECRET_KEY:-troque_em_producao}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://127.0.0.1:8000/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
      - proxy_network

  frontend:
    container_name: ttv-dev-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      DEV_API_PROXY_TARGET: http://ttv-dev-backend:8000
    volumes:
      - ./frontend:/app
      # node_modules no volume: bind mount cobre /app; deps instaladas na subida (abaixo).
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command:
      - sh
      - -c
      - npm ci 2>/dev/null || npm install; exec npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    networks:
      - default
      - proxy_network

volumes:
  ttv_mysql_data:
  frontend_node_modules:

networks:
  default:
    driver: bridge
  proxy_network:
    external: true
