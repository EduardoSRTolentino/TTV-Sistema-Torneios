# Exemplo de stack para deploy (ajuste secrets e domínios)
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ttv_torneios
      MYSQL_USER: ttv
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    volumes:
      - ttv_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://ttv:${MYSQL_PASSWORD:-change_me}@mysql:3306/ttv_torneios
      SECRET_KEY: ${SECRET_KEY:-troque_em_producao}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://127.0.0.1:8000/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ttv_mysql_data:
