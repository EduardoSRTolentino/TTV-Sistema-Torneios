# Exemplo de stack para deploy (ajuste secrets e domínios)
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ttv_torneios
      MYSQL_USER: ttv
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ttv_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    volumes:
      - ttv_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - mysql
  
  backend:
    container_name: ttv-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://ttv:${MYSQL_PASSWORD:-ttv_secret}@mysql:3306/ttv_torneios
      SECRET_KEY: ${SECRET_KEY:-troque_em_producao}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://127.0.0.1:8000/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
      - proxy_network  # Adicione esta linha

  frontend:
    container_name: ttv-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - default
      - proxy_network  # Adicione esta linha

volumes:
  ttv_mysql_data:

networks:
  default:
    driver: bridge
  proxy_network:
    external: true